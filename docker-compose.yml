services:
  desktop:
    build:
      context: .
      dockerfile: Dockerfile
    image: dexbox:latest
    ports:
      - "8600:8600" # Parent service API
      - "5900:5900" # VNC
      - "6080:6080" # noVNC (web browser VNC)
      - "5001:5001" # Screen recording API
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEXBOX_MODEL=${DEXBOX_MODEL:-claude-sonnet-4-5-20250929}
      - DEXBOX_LOG_LEVEL=${DEXBOX_LOG_LEVEL:-INFO}
      - DRIVE_PATHS=${DRIVE_PATHS:-/mnt/tmp,/home/dexbox}
      - DEXBOX_SANDBOX_IMAGE=dexbox-sandbox-python:latest
      - DEXBOX_SANDBOX_PULL_POLICY=${DEXBOX_SANDBOX_PULL_POLICY:-never}
      - DISPLAY_NUM=1
      # RDP Configuration
      - DEXBOX_BACKEND=${DEXBOX_BACKEND:-linux-desktop} # Set to 'rdp' to enable RDP keepalive service
      - RDP_HOST=${RDP_HOST:-}
      - RDP_USERNAME=${RDP_USERNAME:-}
      - RDP_PASSWORD=${RDP_PASSWORD:-}
      - RDP_SECURITY=${RDP_SECURITY:-} # rdp, tls, nla, or auto
      - RDP_RETRY_DELAY_SECONDS=${RDP_RETRY_DELAY_SECONDS:-60}
    volumes:
      # Give the desktop container access to the Docker socket so it can
      # launch sandbox containers as siblings (not nested Docker).
      - /var/run/docker.sock:/var/run/docker.sock
      # Artifacts written by workflows are saved here
      - ./artifacts:/tmp/dexbox-artifacts
      # Optional: mount host directories for Drive access
      # - /path/to/host/files:/mnt/tmp
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8600/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
