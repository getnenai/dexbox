<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dexbox — Remote Desktop</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #1a1a1a; overflow: hidden; }
    #display { width: 100vw; height: 100vh; }
    #status {
      position: fixed; top: 8px; right: 12px;
      font: 13px/1 monospace; color: #888;
      background: rgba(0,0,0,0.6); padding: 4px 8px;
      border-radius: 4px; z-index: 10;
    }
    #status.connected { color: #4f4; }
    #status.readonly { color: #fa0; }
    #status.error { color: #f44; }
  </style>
</head>
<body>
  <div id="status">connecting...</div>
  <div id="display"></div>

  <!-- Apache Guacamole client JS (Apache-2.0) -->
  <script src="/static/guacamole-common.min.js"></script>
  <script>
    (function() {
      // Extract desktop name from URL path: /desktops/<name>/view
      const pathParts = location.pathname.split('/');
      const nameIdx = pathParts.indexOf('desktops') + 1;
      const desktopName = pathParts[nameIdx] || '';

      if (!desktopName) {
        document.getElementById('status').textContent = 'error: no desktop name';
        document.getElementById('status').className = 'error';
        return;
      }

      document.title = 'Dexbox — ' + desktopName;

      const display = document.getElementById('display');
      const statusEl = document.getElementById('status');

      // Build base URL parts
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const tunnelUrl = wsProto + '//' + location.host + '/desktops/' + desktopName + '/tunnel';
      const eventsUrl = '/desktops/' + desktopName + '/events';

      var currentClient = null;
      var currentTunnel = null;
      var isReadonly = false;
      var keyboard = null; // created once; lives for the page lifetime
      var reconnectTimer = null;
      var currentResizeHandler = null;

      function connectTunnel(readonly) {
        isReadonly = readonly;

        if (currentClient) {
          if (currentResizeHandler) {
            window.removeEventListener('resize', currentResizeHandler);
            currentResizeHandler = null;
          }
          currentClient.disconnect();
          currentClient = null;
          currentTunnel = null;
        }

        currentTunnel = new Guacamole.WebSocketTunnel(tunnelUrl);
        currentClient = new Guacamole.Client(currentTunnel);

        // Replace the display element with the new client's display
        display.innerHTML = '';
        var guacEl = currentClient.getDisplay().getElement();
        display.appendChild(guacEl);

        // Connect (pass empty string to avoid ?undefined in tunnel URL)
        currentClient.connect('');

        currentClient.onstatechange = function(state) {
          switch (state) {
            case 0: statusEl.textContent = 'idle'; statusEl.className = ''; break;
            case 1: statusEl.textContent = 'connecting...'; statusEl.className = ''; break;
            case 2: statusEl.textContent = 'waiting...'; statusEl.className = ''; break;
            case 3:
              if (readonly) {
                statusEl.textContent = 'watching (agent active)';
                statusEl.className = 'readonly';
              } else {
                statusEl.textContent = 'connected';
                statusEl.className = 'connected';
                // Auto-hide after 2s
                setTimeout(function() { statusEl.style.opacity = '0.3'; }, 2000);
              }
              break;
            case 4:
              statusEl.textContent = 'disconnecting...';
              statusEl.className = '';
              break;
            case 5:
              statusEl.textContent = 'disconnected';
              statusEl.className = 'error';
              break;
          }
        };

        currentClient.onerror = function(error) {
          statusEl.textContent = 'error: ' + (error.message || 'unknown');
          statusEl.className = 'error';
        };

        if (!readonly) {
          // Mouse and touch are per-display-element, so recreate them each time.
          var mouse = new Guacamole.Mouse(guacEl);
          mouse.onEach(['mousedown', 'mousemove', 'mouseup'], function(e) {
            currentClient.sendMouseState(e.state);
          });

          var touch = new Guacamole.Mouse.Touchscreen(guacEl);
          touch.onEach(['mousedown', 'mousemove', 'mouseup'], function(e) {
            currentClient.sendMouseState(e.state);
          });

          // Keyboard is attached to document — create it once and update
          // its handlers to point at the current client on each reconnect.
          if (!keyboard) {
            keyboard = new Guacamole.Keyboard(document);
          }
          keyboard.onkeydown = function(keysym) { currentClient.sendKeyEvent(1, keysym); };
          keyboard.onkeyup  = function(keysym) { currentClient.sendKeyEvent(0, keysym); };
        } else {
          // Readonly: disable keyboard so keystrokes aren't forwarded.
          if (keyboard) {
            keyboard.onkeydown = null;
            keyboard.onkeyup  = null;
          }
        }

        // Handle resize — remove any prior listener before registering a new one.
        function resize() {
          currentClient.sendSize(window.innerWidth, window.innerHeight);
        }
        currentResizeHandler = resize;
        window.addEventListener('resize', resize);
      }

      // Start in interactive mode; SSE will switch to read-only if agent is active.
      connectTunnel(false);

      // Subscribe to agent session events via SSE.
      var evtSource = new EventSource(eventsUrl);

      evtSource.onmessage = function(e) {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }

        if (e.data === 'agent_connected') {
          // Agent took over — join its guacd session read-only.
          if (!isReadonly) {
            connectTunnel(true);
          }
        } else if (e.data === 'agent_disconnected') {
          // Agent disconnected — reconnect interactive within 3s so the
          // browser viewer can take over without a noticeable gap.
          if (isReadonly) {
            reconnectTimer = setTimeout(function() {
              reconnectTimer = null;
              connectTunnel(false);
            }, 3000);
          }
        }
      };

      evtSource.onerror = function() {
        statusEl.textContent = 'reconnecting...';
        statusEl.className = '';
        statusEl.style.opacity = '1';
      };

      evtSource.onopen = function() {
        // SSE reconnected — the next onmessage will set the correct state.
        // Clear any "reconnecting..." banner left by onerror.
        if (statusEl.textContent === 'reconnecting...') {
          statusEl.textContent = '';
          statusEl.className = '';
        }
      };

      // Cleanup on page unload
      window.addEventListener('beforeunload', function() {
        if (currentResizeHandler) {
          window.removeEventListener('resize', currentResizeHandler);
        }
        if (currentClient) currentClient.disconnect();
        evtSource.close();
      });
    })();
  </script>
</body>
</html>
